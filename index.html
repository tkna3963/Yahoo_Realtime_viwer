<!DOCTYPE html>
<html>

<head>
    <title>RealTime_Yahoo_Earthquake_Info BY TKYT612314</title>
    <base target="_top">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="stylesheet.css" />
    <style>
        body {
            background-color: saddlebrown;
        }
    </style>
</head>

<body>
    <h1>Yahooリアルタイム地震情報掲示板 <a href="https://typhoon.yahoo.co.jp/weather/jp/earthquake/kyoshin/">公式様</a></h1>
    <label for='time_machine'>設定時刻:</label>;
    <input type='text' id='time_machine' name='time_machine'>
    <div id="Main"></div>
    <div id="map" style="height:700px;"></div>
    <div id="earthquake_info"></div> <!-- この行を追加 -->
    <script src="main_script.js"></script>
    <script>
        function updateData() {
            const yahoo_data = yahooShingenn();

            var earthquakeInfo = document.getElementById("earthquake_info");

            if (yahoo_data[3] === "緊急地震速報は出ていません。") {
                earthquakeInfo.style.display = "none";
            } else {
                earthquakeInfo.style.display = "block";
            }

            var yahoo_data_Element = document.getElementById("Main");
            yahoo_data_Element.innerHTML = "";
            var dataHTML = "";
            dataHTML += "<p id='text_box'><strong>現在時刻:</strong> " + yahoo_data[0] + "</p>";
            dataHTML += "<p id='text_box'><strong>取得元URL:</strong> <a href='" + yahoo_data[2] + "'>" + yahoo_data[2] + "</a></p>";
            dataHTML += "<p id='text_box'><strong>強震最大震度:</strong> " + yahoo_data[1] + "</p>";
            dataHTML += "<p id='text_box'><strong>緊急地震速報:</strong> " + yahoo_data[3] + "</p>";
            dataHTML += "<div id='earthquake_info' style='display: " + (yahoo_data[3] === "緊急地震速報は出ていません。" ? "none" : "block") + ";'>";
            dataHTML += "<p id='text_box'><strong>推定震央地:</strong> " + yahoo_data[4] + "(" + yahoo_data[8] + ", " + yahoo_data[9] + ")" + "</p>";
            dataHTML += "</div>";
            dataHTML += "<div id='earthquake_info' style='display: " + (yahoo_data[3] === "緊急地震速報は出ていません。" ? "none" : "block") + ";'>";
            dataHTML += "<p id='text_box'><strong>推定最大震度:</strong> " + yahoo_data[5] + "(" + scaleLevalConversion(yahoo_data[5]) + ")" + "</p>";
            dataHTML += "</div>";
            dataHTML += "<div id='earthquake_info' style='display: " + (yahoo_data[3] === "緊急地震速報は出ていません。" ? "none" : "block") + ";'>";
            dataHTML += "<img src=" + scaleLevalImgConversion(yahoo_data[5]) + ">" + "</img>";
            dataHTML += "</div>";
            dataHTML += "<div id='earthquake_info' style='display: " + (yahoo_data[3] === "緊急地震速報は出ていません。" ? "none" : "block") + ";'>";
            dataHTML += "<p id='text_box'><strong>推定規模(マグニチュード):</strong> " + yahoo_data[6] + "</p>";
            dataHTML += "</div>";
            dataHTML += "<div id='earthquake_info' style='display: " + (yahoo_data[3] === "緊急地震速報は出ていません。" ? "none" : "block") + ";'>";
            dataHTML += "<p id='text_box'><strong>推定深さ:</strong> " + yahoo_data[7] + "</p>";
            dataHTML += "</div>";
            dataHTML += "<div id='earthquake_info' style='display: " + (yahoo_data[3] === "緊急地震速報は出ていません。" ? "none" : "block") + ";'>";
            dataHTML += "<p id='text_box'><strong>推定波位置:</strong>" + "P波(初期微動):約" + yahoo_data[10] + "km" + "   " + "S波(主要動):約" + yahoo_data[11] + "km" + "</p>";
            dataHTML += "</div>";
            yahoo_data_Element.innerHTML = dataHTML;
            
            if (!(yahoo_data[3] === "緊急地震速報は出ていません。")){
             var map = L.map('map').setView([yahoo_data[8], yahoo_data[9]], 10);
             L.tileLayer('https://api.maptiler.com/maps/streets/{z}/{x}/{y}.png?key=IkxKT1ZrEb6IprnTOsui', {
                 attribution: '&copy; <a href="https://www.maptiler.com/copyright/">MapTiler</a> contributors'
             }).addTo(map);
             var marker = L.marker([yahoo_data[8], yahoo_data[9]]).addTo(map);
             marker.bindPopup("<strong>ピンが刺された位置:</strong>" + yahoo_data[4] + "(" + yahoo_data[8] + ", " + yahoo_data[9] + ")<br>").openPopup();
             var center = [yahoo_data[8], yahoo_data[9]]; // 中心座標
             var P_circle = L.circle(center, {
                 color: 'blue',
                 fillColor: scaleColorConversion(yahoo_data[5]),
                 fillOpacity: 0.5,
                 radius: yahoo_data[10] * 1000
             }).addTo(map);
             var S_circle = L.circle(center, {
                color: 'red',
                fillColor: scaleColorConversion(yahoo_data[5]),
                fillOpacity: 0.5,
                radius: yahoo_data[11] * 1000
            }).addTo(map);
            }
        }

        updateData()
        setInterval(updateData, 1000);
    </script>
</body>

</html>
