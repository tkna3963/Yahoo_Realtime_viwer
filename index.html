<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ロック</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }
        h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        input,
        button {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        input:focus,
        button:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.5);
        }
        button {
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #357abd;
        }
        a {
            text-decoration: none;
            color: #4a90e2;
            font-size: 14px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>
    <input type="text" id="password_input" placeholder="パスワードを入力してください">
    <script>
        async function hashText(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        const passwordInput = document.getElementById("password_input");
        async function checkAndRedirect(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                if (response.ok) {
                    window.location.href = url; // 自動遷移
                }
            } catch (error) {
                console.error("Error checking URL:", error);
            }
        }
        passwordInput.addEventListener("input", async () => {
            const password = passwordInput.value;
            if (!password) {
                return;
            }
            const hash = await hashText(password); // 非同期でハッシュを取得
            const url = `https://tkna3963.github.io/Yahoo_Realtime_viwer/${hash}.html`;
            console.log(url); // デバッグ用
            // チェックして存在すれば自動遷移
            checkAndRedirect(url);
        });
    </script>
</body>

</html>
