<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test BY TKYT612314</title>
    <style>
        body {
            background-color: white;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="slider-container">
        <input type="range" id="imageSlider" min="1" max="4" value="1" onchange="updateSliderValue(this.value)">
    </div>
    <div id="images">
        <div class="image-container">
            <img id="imgKyoushinB" src="kyoushin_b.jpg" alt="Kyoushin B" onclick="openImage(this.src)">
        </div>
        <div class="image-container">
            <img id="imgTyoushuki" src="tyoushuki.jpg" alt="Tyoushuki" onclick="openImage(this.src)">
        </div>
        <div class="image-container">
            <img id="imgPGA" src="pga.jpg" alt="PGA" onclick="openImage(this.src)">
        </div>
    </div>
    <!-- 追加：ボタン -->    
    <script src="script.js"></script>
    <script>
        // スライダーの値を更新して表示する関数
        function updateSliderValue(value) {
            document.getElementById("slider-value").textContent = value;
        }
    </script>
</body>

</html>
