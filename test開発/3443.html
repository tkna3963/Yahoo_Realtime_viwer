<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealTime_Yahoo_Earthquake_Info BY TKYT612314</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: darkorchid;
        }
    </style>
    <base target="_top">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="apple-touch-icon" sizes="180x180" href="Required_files/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Required_files/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Required_files/favicon-16x16.png">
    <link rel="manifest" href="Required_files/site.webmanifest">
    <link rel="mask-icon" href="Required_files/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
</head>

<body>
    <h1 id="title">RealTime_Yahoo_Earthquake_Info BY TKYT612314</h1>

    <div class="container">
        <div id="text_box_text"></div>
        <div id="sub_text_box_text"></div>
        <div id="map"></div>
    </div>

    <script src="sccript.js"></script>
    <script>
        text_speak("管理しゃ用地震情報掲示板システム起動")
        function update() {
            var text_box_text_Element = document.getElementById("text_box_text");
            text_box_text_Element.innerHTML = "";
            var main_text_dataHTML = "";
            var main_text_box_text = Display_information_information_return();
            main_text_dataHTML += '<textarea class="textbox" readonly placeholder="' + main_text_box_text + '"></textarea>'
            text_box_text_Element.innerHTML = main_text_dataHTML;

            var sub_text_box_text_Element = document.getElementById("sub_text_box_text");
            sub_text_box_text_Element.innerHTML = "";
            var sub_text_dataHTML = "";
            var sub_text_box_text = `現在時刻:${now_time()}`;
            sub_text_dataHTML += '<textarea class="sub_textbox" readonly placeholder="' + sub_text_box_text + '"></textarea>'
            sub_text_box_text_Element.innerHTML = sub_text_dataHTML;
        }
        var map = L.map('map').setView([0, 0], 8);
        L.tileLayer('https://api.maptiler.com/maps/jp-mierune-dark/256/{z}/{x}/{y}.png?key=IkxKT1ZrEb6IprnTOsui', {
            attribution: '&copy; <a href="https://www.maptiler.com/copyright/">MapTiler</a> contributors'
        }).addTo(map);
        update();
        setInterval(update, 1000);
    </script>

</body>

</html>
