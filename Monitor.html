<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub Window</title>
    <style>
        body {
            background-color: white;
        }

        .image-container {
            display: inline-block;
            margin-right: 10px;
            background-image: url('https://www.lmoni.bosai.go.jp/monitor/data/data/map_img/CommonImg/base_map_w.gif');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
        }

        .image-container img {
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <div id="slider-container">
        <input type="range" id="imageSlider" min="1" max="3" value="1" onchange="updateSliderValue(this.value)">
    </div>
    <div id="images">
        <div class="image-container">
            <img id="imgPGA" src="pga.jpg" alt="PGA" onclick="openImage(this.src)">
        </div>
        <div class="image-container">
            <img id="imgKyoushinS" src="kyoushin_s.jpg" alt="Kyoushin S" onclick="openImage(this.src)">
        </div>
        <div class="image-container">
            <img id="imgTyoushuki" src="tyoushuki.jpg" alt="Tyoushuki" onclick="openImage(this.src)">
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        function updateSliderValue(value) {
            document.getElementById("slider-value").textContent = value;
        }
    </script>
</body>

</html>
