<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyoushin</title>
    <link rel="stylesheet" href="test.css">
    <style>
        body {
            background-color: white;
        }

        .image-container {
            display: inline-block;
            margin-right: 10px;
        }

        .image-container img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .image-container {
            background-image: url('https://www.lmoni.bosai.go.jp/monitor/data/data/map_img/CommonImg/base_map_w.gif');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
        }

        /* モーダルのスタイル */
        .modal {
            display: none; /* 初めは非表示 */
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5); /* 背景の半透明 */
        }

        .modal-content {
            margin: 10% auto;
            display: block;
            max-width: 80%;
            max-height: 80%;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

    </style>
</head>

<body>
    <div id="slider-container">
        <input type="range" id="imageSlider" min="1" max="4" value="1" onchange="updateSliderValue(this.value)">
    </div>
    <div id="images">
        <div class="image-container">
            <img id="imgKyoushin" src="kyoushin_b.jpg" alt="Kyoushin B" onclick="openImage(this.src)">
        </div>
        <div class="image-container">
            <img id="imgTyoushuki" src="tyoushuki.jpg" alt="Tyoushuki" onclick="openImage(this.src)">
        </div>
        <div class="image-container">
            <img id="imgPGA" src="pga.jpg" alt="PGA" onclick="openImage(this.src)">
        </div>
    </div>

    <!-- モーダルのHTML -->
    <div id="myModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        function updateSliderValue(value) {
            document.getElementById("slider-value").textContent = value;
        }

        function now_time() {
            currentDateTime = new Date();
            return currentDateTime;
        }

        function padZero(value) {
            return value < 10 ? '0' + value : value;
        }

        function Yahoo_Time_date_fromat(dateTime) {
            const year = dateTime.getFullYear();
            const month = padZero(dateTime.getMonth() + 1);
            const date = padZero(dateTime.getDate());
            const hours = padZero(dateTime.getHours());
            const minutes = padZero(dateTime.getMinutes());
            const seconds = padZero(dateTime.getSeconds());
            return `${year}${month}${date}/${year}${month}${date}${hours}${minutes}${seconds}`;
        }

        function formatYahooTimeDate(dateString, timeZone = 'Asia/Tokyo') {
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: timeZone };
            const date = new Date(dateString);
            const formatter = new Intl.DateTimeFormat('ja-JP', options);
            const formattedDate = formatter.format(date);
            const dayOfWeek = ['日', '月', '火', '水', '木', '金', '土'][date.getDay()];
            return formattedDate.replace(/\//g, '年').replace(' ', `日(${dayOfWeek}曜日) `).replace(':', '時').replace(':', '分') + '秒';
        }

        function Kyoushin_moniter_url() {
            now_time_date = now_time();
            set_time = new Date(now_time_date.getTime() - 3 * 1000);
            url_time_date = Yahoo_Time_date_fromat(set_time);
            const Kyoushin_S_Url = `http://www.kmoni.bosai.go.jp/data/map_img/RealTimeImg/jma_s/${url_time_date}.jma_s.gif`;
            const Tyoushuki_Url = `https://www.lmoni.bosai.go.jp/monitor/data/data/map_img/RealTimeImg/abrspmx_s/${url_time_date}.abrspmx_s.gif`;
            const PGA_Url = `https://smi.lmoniexp.bosai.go.jp/data/map_img/RealTimeImg/acmap_s/${url_time_date}.acmap_s.gif`;
            return {
                "Kyoushin_S_Url": Kyoushin_S_Url,
                "Tyoushuki_Url": Tyoushuki_Url,
                "PGA_Url": PGA_Url
            };
        }

        function Update() {
            const urls = Kyoushin_moniter_url();
            document.getElementById('imgKyoushin').src = urls.Kyoushin_S_Url;
            document.getElementById('imgTyoushuki').src = urls.Tyoushuki_Url;
            document.getElementById('imgPGA').src = urls.PGA_Url;
            console.log(urls);
        }

        function updateImages() {
            const sliderValue = document.getElementById('imageSlider').value;
            const images = document.querySelectorAll('.image-container');
            images.forEach((image, index) => {
                if (index < sliderValue) {
                    image.style.display = 'block';
                } else {
                    image.style.display = 'none';
                }
            });
        }

        // モーダルを開く
        function openImage(src) {
            const modal = document.getElementById("myModal");
            const modalImage = document.getElementById("modalImage");
            modal.style.display = "block";
            modalImage.src = src;
        }

        // モーダルを閉じる
        function closeModal() {
            const modal = document.getElementById("myModal");
            modal.style.display = "none";
        }

        document.getElementById('imageSlider').addEventListener('input', updateImages);

        Update();
        setInterval(Update, 1000);
        updateImages();
    </script>
</body>

</html>
